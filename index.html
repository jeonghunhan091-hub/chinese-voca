<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>중국어 단어장</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { display: flex; gap: 20px; max-width: 1000px; width: 100%; align-items: flex-start; }
        
        #sidebar { background: white; border-radius: 15px; padding: 20px; width: 350px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; max-height: 85vh; }
        
        #scope-select, #qmode-select { width: 100%; padding: 10px; font-size: 1.05rem; font-weight: bold; border: 2px solid #2196F3; border-radius: 5px; cursor: pointer; margin-bottom: 10px; text-align: center; }
        #scope-select { color: #1976D2; background-color: #e3f2fd; }
        #qmode-select { color: #388E3C; background-color: #E8F5E9; border-color: #4CAF50; }
        #scope-select:focus, #qmode-select:focus { outline: none; }

        #sidebar h3 { margin-top: 10px; text-align: center; color: #333; font-size: 1.1rem; border-top: 1px solid #eee; padding-top: 15px; }
        
        .mode-toggles { display: flex; gap: 5px; margin-bottom: 10px; }
        .mode-btn { flex: 1; padding: 8px; font-size: 0.85rem; border: 1px solid #ccc; background-color: #f9f9f9; cursor: pointer; border-radius: 5px; }
        .mode-btn.active { background-color: #2196F3; color: white; border-color: #2196F3; font-weight: bold; }
        
        .reset-btn-container { text-align: right; margin-bottom: 10px; }
        #reset-checks-btn { font-size: 0.8rem; padding: 5px 10px; background-color: #757575; color: white; border: none; border-radius: 3px; cursor: pointer; }
        #reset-checks-btn:hover { background-color: #616161; }

        .range-selector { display: flex; align-items: center; gap: 5px; margin-bottom: 10px; padding: 10px; background-color: #f0f8ff; border-radius: 5px; border: 1px solid #bbdefb; font-size: 0.85rem; justify-content: space-between; }
        .range-selector input[type="number"] { width: 45px; padding: 5px; border: 1px solid #ccc; border-radius: 3px; text-align: center; }
        .range-btn-group { display: flex; gap: 3px; }
        .range-selector button { padding: 5px 10px; font-size: 0.8rem; cursor: pointer; border: none; border-radius: 3px; color: white; font-weight: bold; }
        #range-check-btn { background-color: #4CAF50; }
        #range-uncheck-btn { background-color: #f44336; }

        #voca-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex-grow: 1; border: 1px solid #eee; border-radius: 5px; padding: 10px; }
        #voca-list li { padding: 5px 0; border-bottom: 1px dashed #eee; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        #voca-list li:hover { background-color: #f1f1f1; }
        #voca-list input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }
        .word-index { color: #888; font-size: 0.85rem; min-width: 20px; display: inline-block; }

        #start-test-btn { margin-top: 15px; background-color: #FF5722; color: white; border: none; padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #start-test-btn:hover { background-color: #E64A19; }

        #main-content { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .card { position: relative; background: white; border-radius: 15px; padding: 40px 30px 30px 30px; width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #back-btn { font-size: 0.85rem; padding: 5px 10px; background-color: #607D8B; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; }
        #progress-text { font-size: 0.9rem; font-weight: bold; color: #E91E63; display: none; }
        #shuffle-btn { font-size: 0.8rem; padding: 5px 10px; background-color: #9E9E9E; color: white; border: none; border-radius: 5px; cursor: pointer; display: none; }

        #chinese-text { color: #333; margin-top: 10px; margin-bottom: 15px; font-size: 3.5rem; }
        #korean-text { color: #1976D2; margin-top: 10px; margin-bottom: 15px; font-size: 1.8rem; }
        
        input[type="text"] { font-size: 1.2rem; padding: 10px; width: 80%; margin: 10px 0 20px 0; border: 2px solid #ddd; border-radius: 5px; text-align: center; }
        
        button { font-size: 1rem; padding: 10px 20px; border: none; border-radius: 5px; background-color: #4CAF50; color: white; cursor: pointer; }
        button:hover { background-color: #45a049; }
        
        #tone-buttons { margin-bottom: 15px; display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; display: none; }
        .tone-btn { padding: 5px 8px; font-size: 0.9rem; background-color: #f1f1f1; color: #333; border: 1px solid #ccc; }
        .tone-btn:hover { background-color: #e0e0e0; }
        #delete-btn { background-color: #ff5252; color: white; border: 1px solid #ff5252; font-weight: bold; }
        
        .action-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        #next-btn { background-color: #2196F3; display: none; }
        #forgot-hanzi-btn { background-color: #9C27B0; display: none; font-size: 0.9rem; }
        #forgot-hanzi-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        #end-buttons { display: none; margin-top: 15px; }
        #end-buttons button { margin: 5px; font-size: 0.9rem; }
        #restart-all-btn { background-color: #ff9800; }
        #restart-random-btn { background-color: #9C27B0; color: white; }
        #retry-wrong-btn { background-color: #f44336; color: white; }

        .feedback { font-size: 1.1rem; font-weight: bold; margin: 15px 0 5px 0; min-height: 25px; }
        
        /* 📌 출처 표시 박스 디자인 스타일 추가 */
        #source-info-box { display: none; margin-top: 15px; padding: 15px; background-color: #FFF9C4; border: 1px solid #FBC02D; border-radius: 8px; text-align: left; font-size: 0.95rem; color: #333; line-height: 1.5; }
        #source-info-box strong { color: #E65100; }

        .wrong-words-container { margin-top: 20px; background: #fff; width: 400px; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: none; }
        .wrong-words-container h3 { color: #d32f2f; margin-top: 0; border-bottom: 2px solid #d32f2f; padding-bottom: 10px;}
        ul.wrong-list { list-style-type: none; padding: 0; text-align: left; }
        ul.wrong-list li { padding: 8px 0; border-bottom: 1px dashed #eee; font-size: 1.1rem; }
        
        #welcome-screen { text-align: center; color: #555; padding: 50px 0; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside id="sidebar">
            <select id="scope-select">
                <option value="final">기말고사 범위</option>
                <option value="midterm">중간고사 범위</option>
            </select>

            <select id="qmode-select">
                <option value="zh-to-py">문제: 한자 보고 병음 맞추기</option>
                <option value="ko-to-py">문제: 뜻 보고 병음 맞추기</option>
                <option value="single-char">🔥 문제: 한 글자씩 쪼개서 맞추기</option>
            </select>

            <h3>📝 단어장 관리</h3>
            
            <div class="mode-toggles">
                <button class="mode-btn active" id="mode-exclude-btn">제외할 단어 선택</button>
                <button class="mode-btn" id="mode-include-btn">시험 볼 단어 선택</button>
            </div>
            
            <div class="reset-btn-container">
                <button id="reset-checks-btn">🔄 체크 전체 초기화</button>
            </div>

            <div class="range-selector">
                <div>
                    <input type="number" id="range-start" placeholder="1" min="1">
                    <span>~</span>
                    <input type="number" id="range-end" placeholder="10" min="1">
                </div>
                <div class="range-btn-group">
                    <button id="range-check-btn">✔ 체크</button>
                    <button id="range-uncheck-btn">✖ 해제</button>
                </div>
            </div>

            <ul id="voca-list"></ul>
            
            <button id="start-test-btn">🚀 시험 시작하기</button>
        </aside>

        <main id="main-content">
            <div class="card">
                <div class="card-header">
                    <button id="back-btn">◀ 목록으로</button>
                    <span id="progress-text"></span>
                    <button id="shuffle-btn">🔀 무작위</button>
                </div>

                <div id="welcome-screen">
                    <h2>👈 왼쪽 단어장에서<br>설정을 마치고<br>시험을 시작하세요!</h2>
                </div>

                <h2 id="chinese-text" style="display: none;">로딩 중...</h2>
                <h1 id="korean-text" style="display: none;">로딩 중...</h1>

                <input type="text" id="pinyin-input" placeholder="병음 입력" autocomplete="off" style="display: none;">
                
                <div id="tone-buttons">
                    <button class="tone-btn" data-tone="1">1성</button>
                    <button class="tone-btn" data-tone="2">2성</button>
                    <button class="tone-btn" data-tone="3">3성</button>
                    <button class="tone-btn" data-tone="4">4성</button>
                    <button class="tone-btn" data-tone="5">경성</button>
                    <button class="tone-btn" id="delete-btn">⌫ 지우기</button>
                </div>

                <button id="submit-btn" style="display: none;">확인</button>
                
                <p id="feedback-msg" class="feedback"></p>

                <div id="source-info-box"></div>

                <div class="action-buttons">
                    <button id="next-btn">다음 단어</button>
                    <button id="forgot-hanzi-btn">🤔 한자 기억 안 남 (오답 추가)</button>
                </div>
                
                <div id="end-buttons">
                    <button id="restart-all-btn">🔄 이 설정대로 처음부터</button>
                    <button id="restart-random-btn">🔀 랜덤 시작</button>
                    <button id="retry-wrong-btn">🚨 틀린 단어만</button>
                </div>
            </div>

            <div class="wrong-words-container" id="wrong-container">
                <h3>🚨 오답 노트 (틀린 단어장)</h3>
                <ul class="wrong-list" id="wrong-list"></ul>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
